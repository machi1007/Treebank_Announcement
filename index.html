<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>大樹點數銀行經濟數據系統</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:"Microsoft JhengHei";
background:#eef3f8;
margin:0;
}

.header{
background:#2c3e50;
color:white;
text-align:center;
padding:20px;
font-size:30px;
}

.container{
width:1100px;
margin:auto;
margin-top:25px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:#f7f9fc;
padding:20px;
border-radius:8px;
text-align:center;
}

.cardTitle{
font-size:18px;
}

.cardValue{
font-size:28px;
color:#e74c3c;
margin-top:10px;
}

.section{
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#ecf0f1;
}

.value{
color:#2980b9;
font-weight:bold;
}

.notice{
margin-top:25px;
background:#fff7d6;
padding:15px;
border-radius:8px;
font-size:18px;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
🏦 大樹點數銀行經濟數據公告板
</div>

<div class="container">
<div class="notice">

📢 <b>大樹點數銀行公告</b>
<p>溫馨存款活動：<b>活存1.5%/2週、定存5%/月</b></p>
<b>【當前經濟狀況】</b>：
<b id="announcement"></b>
</div>
<div>
<h2>📢 經濟數據公告</h2>
</div>
<div class="dashboard">

<div class="card">
<div class="cardTitle">通貨膨脹指數</div>
<div class="cardValue" id="inflation"></div>
</div>

<div class="card">
<div class="cardTitle">建議本週薪資</div>
<div class="cardValue" id="salary"></div>
</div>

<div class="card">
<div class="cardTitle">消費者物價指數(CPI)</div>
<div class="cardValue" id="cpi"></div>
</div>

<div class="card">
<div class="cardTitle">貨幣供給量</div>
<div class="cardValue" id="money"></div>
</div>

<div class="card">
<div class="cardTitle">股票結算價格</div>
<div class="cardValue" id="stockp"></div>
</div>

</div>

<div class="section">

<h2>📈 當前銀行利率</h2>

<table>

<tr>
<th>項目</th>
<th>利率</th>
</tr>

<tr>
<td>活存利率</td>
<td id="savingRate"></td>
</tr>

<tr>
<td>定存利率</td>
<td id="fixedRate"></td>
</tr>

</table>

</div>

<div class="section">

<h2>💰 薪資獎金參照表</h2>

<table id="salaryTable">

<tr>
<th>項目</th>
<th>基準薪資</th>
<th>建議薪資</th>
<th>說明</th>
</tr>

</table>

</div>

<div class="section">

<h2>📊 股價結算歷史折線圖</h2>

<canvas id="stockpChart"></canvas>

</div>

<div class="section">

<h2>📊 通膨指數歷史折線圖</h2>

<canvas id="inflationChart"></canvas>

</div>

<div class="section">

<h2>📊 每週薪資歷史折線圖</h2>

<canvas id="salaryChart"></canvas>

</div>
<div class="section">

<h2>📊 消費物價歷史折線圖</h2>

<canvas id="cpiChart"></canvas>

</div>
<div class="section">

<h2>📊 貨幣供給歷史折線圖</h2>

<canvas id="moneyChart"></canvas>

</div>

<div class="section">

<h2>📜 大樹銀行歷史數據表</h2>

<table id="historyTable">

<tr>
<th>日期</th>
<th>通膨指數</th>
<th>週薪</th>
<th>CPI (%)</th>
<th>貨幣供給量</th>
<th>股票結算價</th>
</tr>

</table>

</div>	
</div>

<script>

/* ======================
老師只需要修改這裡
====================== */

let baseAsset = 500
let currentAsset = 600
let students = 28

let baseSalary = 30
let adjustRatio = 0.8

let savingRate = 1.5
let fixedRate = 5

let basePrice = 100
let currentPrice = 200

let stockp = 15.7

let salaryData = [

{name:"每週薪資",base:30,note:"擔任職位認真負責"},
{name:"每週加碼獎金A",base:15,note:"擔任職務卓越表現III"},
{name:"每週加碼獎金B",base:10,note:"擔任職務卓越表現II"},
{name:"每週加碼獎金C",base:5,note:"擔任職務卓越表現I"},
{name:"每週職位獎金",base:10,note:"職位加碼獎金"},

]


/* ======================
歷史資料（新增一行即可）
====================== */

let historyData=[
{date:"2026-02-26",inflation:1.0,salary:10,cpi:0.0,money:11200,stockp:10.4},
{date:"2026-03-05",inflation:1.1,salary:10,cpi:30.0,money:12500,stockp:9.7},
{date:"2026-03-06",inflation:1.2,salary:10,cpi:40.0,money:14000,stockp:10.2},
{date:"2026-03-13",inflation:1.4,salary:15,cpi:114.3,money:15400,stockp:14.4},
{date:"2026-03-16",inflation:1.2,salary:30,cpi:100.0,money:16800,stockp:15.7}

]


/* ======================
經濟計算
====================== */

let inflation=currentAsset/baseAsset

let newSalary=Math.round(baseSalary*inflation*adjustRatio)

let money=currentAsset*students

let cpi=((currentPrice-basePrice)/basePrice)*100


document.getElementById("inflation").innerText=inflation.toFixed(2)

document.getElementById("salary").innerText=newSalary+" 點"

document.getElementById("money").innerText=money+" 點"

document.getElementById("cpi").innerText=cpi.toFixed(1)+"%"

document.getElementById("savingRate").innerText=savingRate+"% / 每兩週"

document.getElementById("fixedRate").innerText=fixedRate+"% / 每月"

document.getElementById("stockp").innerText = stockp + " 點";


/* ======================
薪資表
====================== */

let table=document.getElementById("salaryTable")

salaryData.forEach(item=>{

let value=Math.round(item.base*inflation*adjustRatio)

table.innerHTML+=`
<tr>
<td>${item.name}</td>
<td>${item.base}</td>
<td class="value">${value}</td>
<td>${item.note}</td>
</tr>
`

})


/* ======================
歷史表
====================== */

let historyTable=document.getElementById("historyTable")

historyData.forEach(h=>{

historyTable.innerHTML+=`
<tr>
<td>${h.date}</td>
<td>${h.inflation}</td>
<td>${h.salary}</td>
<td>${h.cpi}</td>
<td>${h.money}</td>
<td>${h.stockp}</td>
</tr>
`

})


/* ======================
圖表資料
====================== */

let labels=historyData.map(h=>h.date)

let inflationHistory=historyData.map(h=>h.inflation)

let salaryHistory=historyData.map(h=>h.salary)

let cpiHistory=historyData.map(h=>h.cpi)

let moneyHistory=historyData.map(h=>h.money)

let stockpHistory=historyData.map(h=>h.stockp)


new Chart(document.getElementById("inflationChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"通膨指數",
data:inflationHistory,
fill:false
}]
}

})


new Chart(document.getElementById("salaryChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"每週薪資",
data:salaryHistory,
fill:false
}]
}

})

new Chart(document.getElementById("cpiChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"CPI指數",
data:cpiHistory,
fill:false
}]
}

})

new Chart(document.getElementById("moneyChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"貨幣供給量",
data:moneyHistory,
fill:false
}]
}

})

new Chart(document.getElementById("stockpChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"price",
data:stockpHistory,
fill:false
}]
}

})


/* ======================
公告
====================== */

let text=""

if(inflation<1){

text="📉 經濟緊縮：市場貨幣減少"

}
else if(inflation<1.5){

text="📊 經濟穩定"

}
else if(inflation<2){

text="📈 通貨膨脹：薪資已調整"

}
else{

text="🔥 超級通膨：市場資金過多"

}

document.getElementById("announcement").innerText=text

</script>

</body>
</html>
