<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>貨幣與消費計算器（終極經濟版）</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:"Microsoft JhengHei"; padding:20px; background:#f5f5f5;}
textarea { width:100%; height:260px; font-family:monospace; margin-bottom:10px;}
button { padding:10px 20px; font-size:16px; margin-bottom:10px;}
.result { margin-top:20px; font-size:16px; font-weight:bold; white-space:pre-line;}
table { border-collapse:collapse; width:100%; margin-top:10px;}
table, th, td { border:1px solid #999; }
th, td { padding:6px 10px; text-align:center; }
canvas { margin-top:20px; background:white; padding:10px; border-radius:10px;}
</style>
</head>

<body>

<a href="index3.html" style="background:#e74c3c;color:white;padding:8px 12px;border-radius:5px;text-decoration:none;">
🏠 回到經濟控制台
</a>

<h2>貨幣與消費計算器</h2>

<p>每行格式：座號 姓名 存摺 定存 股票 網拍(競標中) 總餘額 網拍(已得標，例如 11件 / 11) 總資產</p>

<textarea id="dataInput"></textarea><br>
<button onclick="calculateTotals()">計算經濟數據</button>

<div class="result" id="totals"></div>

<table id="dataTable">
<thead>
<tr>
<th>座號</th><th>姓名</th><th>存摺</th><th>定存</th>
<th>股票</th><th>競標中</th><th>總餘額</th>
<th>已得標</th><th>總資產</th>
</tr>
</thead>
<tbody></tbody>
</table>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
<canvas id="chart3"></canvas>
<canvas id="chart4"></canvas>
<canvas id="chart5"></canvas>
<canvas id="chart6"></canvas>
<canvas id="chart7"></canvas> <!-- ⭐洛倫茲曲線 -->

<script>
let charts=[];

function toNum(str){
  return parseInt(str.replace(/,/g,"")) || 0;
}

// ===== 吉尼係數 =====
function gini(arr){
  const n = arr.length;
  if(n === 0) return 0;

  const sorted = [...arr].sort((a,b)=>a-b);
  const total = sorted.reduce((a,b)=>a+b,0);
  if(total === 0) return 0;

  let weightedSum = 0;
  for(let i=0;i<n;i++){
    weightedSum += (i+1) * sorted[i];
  }

  return (2 * weightedSum) / (n * total) - (n + 1) / n;
}

// ===== 洛倫茲曲線 =====
function lorenzData(arr){
  const sorted=[...arr].sort((a,b)=>a-b);
  const total=sorted.reduce((a,b)=>a+b,0);

  let cum=0;
  let points=[0];
  sorted.forEach(v=>{
    cum+=v;
    points.push(cum/total);
  });

  return points;
}

function calculateTotals(){

  const input=document.getElementById("dataInput").value.trim();
  if(!input) return alert("請輸入數據！");

  const lines=input.split("\n");
  const tbody=document.querySelector("#dataTable tbody");
  tbody.innerHTML="";

  let totalMoney=0,totalConsumption=0,totalItems=0,totalAssets=0;
  let players=[];

  lines.forEach(line=>{
    if(!line.trim()) return;

    let p=line.trim().split(/\s+/);
    if(p.length<7) return;

    const seat=p[0];
    const name=p[1];
    const saving=toNum(p[2]);
    const fixed=toNum(p[3]);
    const stock=toNum(p[4]);
    const pending=toNum(p[5]);
    const balance=toNum(p[6]);

    const matches=line.match(/(\d+)件\s*\/\s*([\d,]+)\s+([\d,]+)$/);

    let items=0,consume=0,asset=0;

    if(matches){
      items=parseInt(matches[1]);
      consume=toNum(matches[2]);
      asset=toNum(matches[3]);
    }

    totalMoney+=balance;
    totalConsumption+=consume;
    totalItems+=items;
    totalAssets+=asset;

    players.push({
      name,
      asset,
      consume,
      balance
    });

    tbody.innerHTML+=`
    <tr>
    <td>${seat}</td><td>${name}</td>
    <td>${saving}</td><td>${fixed}</td>
    <td>${stock}</td><td>${pending}</td>
    <td>${balance}</td>
    <td>${items}件 / ${consume}</td>
    <td>${asset}</td>
    </tr>`;
  });

  const n=players.length;

  const avgMoney=(totalMoney/n).toFixed(1);
  const avgAsset=(totalAssets/n).toFixed(1);
  const avgConsume=(totalConsumption/n).toFixed(1);
  const avgPrice= totalItems? (totalConsumption/totalItems).toFixed(2):0;

  // 排序
  const assetSorted=[...players].sort((a,b)=>b.asset-a.asset);
  const consumeSorted=[...players].sort((a,b)=>b.consume-a.consume);
  const balanceSorted=[...players].sort((a,b)=>b.balance-a.balance);

  // 吉尼
  const giniValue=gini(players.map(p=>p.asset));

  let giniText="";
  if(giniValue<0.2) giniText="（超平均）";
  else if(giniValue<0.4) giniText="（合理差距）";
  else if(giniValue<0.6) giniText="（差距偏大）";
  else giniText="（貧富差距嚴重）";

  // 財富集中度
  const top20=Math.ceil(n*0.2);
  const topAssets=assetSorted.slice(0,top20).reduce((s,p)=>s+p.asset,0);
  const concentration=((topAssets/totalAssets)*100).toFixed(1);

  document.getElementById("totals").innerText=`
貨幣供給量: ${totalMoney} ｜ 平均餘額: ${avgMoney}
消費總額: ${totalConsumption} ｜ 平均消費: ${avgConsume}
CPI: ${avgPrice}

總資產: ${totalAssets} ｜ 平均資產: ${avgAsset}

📊 吉尼係數: ${giniValue.toFixed(3)} ${giniText}
🟡 前20%掌握: ${concentration}%

📈 羅倫茲曲線：越彎代表越不公平
`;

  // 清圖
  charts.forEach(c=>c.destroy());
  charts=[];

  function makeChart(id,label,labels,data,type){
    const c=new Chart(document.getElementById(id),{
      type:type,
      data:{labels:labels,datasets:[{label:label,data:data}]}
    });
    charts.push(c);
  }

  // 原本圖
  makeChart("chart1","資產分布",assetSorted.map(p=>p.name),assetSorted.map(p=>p.asset),'bar');
  makeChart("chart2","資產排名",assetSorted.map(p=>p.name),assetSorted.map(p=>p.asset),'line');
  makeChart("chart3","消費分布",consumeSorted.map(p=>p.name),consumeSorted.map(p=>p.consume),'bar');
  makeChart("chart4","消費排名",consumeSorted.map(p=>p.name),consumeSorted.map(p=>p.consume),'line');
  makeChart("chart5","餘額分布",balanceSorted.map(p=>p.name),balanceSorted.map(p=>p.balance),'bar');
  makeChart("chart6","餘額排名",balanceSorted.map(p=>p.name),balanceSorted.map(p=>p.balance),'line');

  // ===== 洛倫茲 =====
  const lorenz=lorenzData(players.map(p=>p.asset));
  const labels=lorenz.map((_,i)=>(i/ (lorenz.length-1) *100).toFixed(0)+"%");

  const c=new Chart(document.getElementById("chart7"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {
          label:'羅倫茲曲線(完全平等)',
          data:labels.map((_,i)=>i/(labels.length-1)),
          borderDash:[5,5]
        },
        {
          label:'羅倫茲曲線(實際分配)',
          data:lorenz
        }
      ]
    }
  });
  charts.push(c);
}
</script>

</body>
</html>
