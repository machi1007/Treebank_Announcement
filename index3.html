<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🏦 大樹銀行超級經濟控制台</title>
<style>
body{
  font-family:"Microsoft JhengHei";
  background:linear-gradient(135deg,#e8f0ff,#ffffff);
  margin:0;
  padding:30px;
}
.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
h1{
  text-align:center;
  margin-bottom:30px;
}
/* 智慧貼上區樣式 */
.smart-paste-box {
  background: #fff3e0;
  border: 2px dashed #f39c12;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 25px;
}
.smart-paste-box label {
  font-weight: bold;
  color: #d35400;
  display: block;
  margin-bottom: 8px;
  font-size: 16px;
}
.smart-paste-box textarea {
  width: 100%;
  height: 80px;
  font-family: inherit;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  resize: vertical;
}
.controlGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:30px;
}
.controlBox{
  background:#f7f9fc;
  padding:15px;
  border-radius:8px;
  border-bottom: 3px solid #e2e8f0;
}
.controlBox.new-param {
  border-bottom: 3px solid #3498db; /* 標示新參數 */
  background: #ebf5fb;
}
.controlBox label{
  font-size:14px;
  display:block;
  margin-bottom:4px;
  font-weight: bold;
  color: #2c3e50;
}
.controlBox input{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  transition: background-color 0.4s;
  box-sizing: border-box;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  margin-right:10px;
}
.calcBtn{ background:#3498db; color:white; }
.addBtn{ background:#2ecc71; color:white; }
.dashboard{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-top:20px;
}
.card{
  flex:1;
  min-width:150px;
  background:#f7f9fc;
  padding:20px;
  border-radius:8px;
  text-align:center;
}
.cardTitle{ font-size:14px; }
.cardValue{
  font-size:26px;
  color:#e74c3c;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
}
th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
th{ background:#ecf0f1; }
#output{
  width:100%;
  height:200px;
  margin-top:20px;
  font-family:consolas;
  background:#1e1e1e;
  color:#00ff9c;
  padding:10px;
  border-radius:8px;
  box-sizing: border-box;
}
</style>
</head>
<body>
<div class="container">
<h1>🏦 大樹銀行超級經濟控制台</h1>

<div class="smart-paste-box">
  <label>📥 終極智慧貼上區：可貼上「全班原始數據」或「程式碼輸出的完整內容」！</label>
  <textarea id="quickPaste" placeholder="直接貼上後台輸出的那整串程式碼，或是全班數據..." oninput="autoFillData()"></textarea>
</div>

<div class="controlGrid">
    <div class="controlBox"><label>日期</label><input type="date" id="date"></div>
    <div class="controlBox"><label>銀行資產 currentAsset</label><input type="number" id="asset" step="0.1"></div>
    <div class="controlBox"><label>商品價格 currentPrice</label><input type="number" id="price" step="0.01"></div>
    <div class="controlBox"><label>股票結算價 stockp</label><input type="number" id="stock"></div>
    
    <div class="controlBox"><label>吉尼係數 gini (選填)</label><input type="number" id="gini" step="0.001" placeholder="例如: 0.320"></div>
    <div class="controlBox"><label>基準資產 baseAsset</label><input type="number" id="baseAsset" value="500"></div>
    <div class="controlBox"><label>基準薪資 baseSalary</label><input type="number" id="baseSalary" value="30"></div>
    <div class="controlBox"><label>調整比例 adjustRatio</label><input type="number" id="adjustRatio" value="0.8" step="0.1"></div>
    
    <div class="controlBox"><label>基準價格 basePrice</label><input type="number" id="basePrice" value="10"></div>
    <div class="controlBox"><label>學生數 students</label><input type="number" id="students" value="28"></div>
    
    <div class="controlBox new-param"><label>發行股數 totalShares</label><input type="number" id="totalShares" value="360"></div>
    <div class="controlBox new-param"><label>儲蓄率 savingRate</label><input type="number" id="savingRate" value="0.5" step="0.1"></div>
    <div class="controlBox new-param"><label>固定利率 fixedRate</label><input type="number" id="fixedRate" value="7"></div>
</div>
<h3>
<button class="calcBtn" onclick="calculate()">⚙ 計算經濟</button>
<button class="addBtn" onclick="addHistory()">📥 加入歷史</button>
</h3>
<h4>
<a href="index4.html" target="_blank" style="background:#edae5c;color:white;padding:8px 12px;border-radius:5px;text-decoration:none;margin-left:10px;">📝 開啟貨幣消費計算</a>
<a href="https://machi1007.github.io/TreeSTOCK_price_estimation/" target="_blank" style="background:#ff0000;color:white;padding:8px 12px;border-radius:5px;text-decoration:none;margin-left:10px;">📋 股市計算系統</a>
<a href="index8.html" target="_blank" style="background:#ff0000;color:white;padding:8px 12px;border-radius:5px;text-decoration:none;margin-left:10px;">🔒 開啟教師後臺</a>
<a href="index.html" target="_blank" style="background:#87CEEB;color:white;padding:8px 12px;border-radius:5px;text-decoration:none;margin-left:10px;">🏠 回到數據公告</a>
</h4>

<div class="dashboard">
    <div class="card"><div class="cardTitle">通膨指數</div><div class="cardValue" id="inflation"></div></div>
    <div class="card"><div class="cardTitle">建議薪資</div><div class="cardValue" id="salary"></div></div>
    <div class="card"><div class="cardTitle">CPI</div><div class="cardValue" id="cpi"></div></div>
    <div class="card"><div class="cardTitle">貨幣供給</div><div class="cardValue" id="money"></div></div>
    <div class="card"><div class="cardTitle">名目 GDP</div><div class="cardValue" id="gdpNominal"></div></div>
    <div class="card" style="background: #e8f8f5; border: 2px solid #1abc9c;"><div class="cardTitle">實質 GDP</div><div class="cardValue" id="gdpReal" style="color:#16a085;"></div></div>
    <div class="card"><div class="cardTitle">實質成長率</div><div class="cardValue" id="gdpGrowthReal"></div></div>
    <div class="card"><div class="cardTitle">吉尼係數</div><div class="cardValue" id="giniDisplay">-</div></div>
</div>

<h2>📜 歷史資料</h2>
<table id="historyTable">
<tr><th>日期</th><th>通膨</th><th>薪資</th><th>CPI</th><th>貨幣</th><th>名目GDP</th><th>實質成長</th><th>股價</th><th>吉尼係數</th></tr>
</table>

<h2>💻 匯出程式碼 (包含所有 8 大參數與歷史紀錄)</h2>
<textarea id="output" onclick="this.select()"></textarea>

</div>

<script>
let historyData=[];
let salaryData=[]; // 預留暫存空間，確保導出時薪水資料不會不見
let lastData=null;

function toNum(str){ return parseInt(str.replace(/,/g,"")) || 0; }

function calcGini(arr){
  const n = arr.length;
  if(n === 0) return 0;
  const sorted = [...arr].sort((a,b)=>a-b);
  const total = sorted.reduce((a,b)=>a+b,0);
  if(total === 0) return 0;
  let weightedSum = 0;
  for(let i=0;i<n;i++){ weightedSum += (i+1) * sorted[i]; }
  return (2 * weightedSum) / (n * total) - (n + 1) / n;
}

function flashHighlight(id) {
  let el = document.getElementById(id);
  if(!el) return;
  el.style.backgroundColor = "#f1c40f"; 
  setTimeout(() => { el.style.backgroundColor = ""; }, 600); // 恢復原底色
}

// 🌟 核心：全能解析引擎
function autoFillData() {
  let text = document.getElementById("quickPaste").value;
  if (!text.trim()) return;

  // --- A. 如果貼上的是程式碼 ---
  if (text.includes("let historyData") || text.includes("historyData =")) {
    try {
      const sandbox = {};
      const cleanCode = text.replace(/(let|const|var)\s+/g, "sandbox.");
      new Function('sandbox', cleanCode)(sandbox);

      if (sandbox.historyData) historyData = sandbox.historyData;
      if (sandbox.salaryData) salaryData = sandbox.salaryData;

      // 完整的 8 大參數同步
      const params = ['baseAsset', 'students', 'totalShares', 'baseSalary', 'adjustRatio', 'savingRate', 'fixedRate', 'basePrice'];
      params.forEach(p => {
        if (sandbox[p] !== undefined) {
          document.getElementById(p).value = sandbox[p];
          flashHighlight(p);
        }
      });
      
      render();
      alert("✅ 程式碼解析成功！所有參數與歷史紀錄已還原。");
      return;
    } catch (e) { console.error("程式碼解析出錯", e); }
  }

  // --- B. 原本的「分析結果」文字格式解析 ---
  let matchAsset = text.match(/平均餘額:\s*([\d.]+)/);
  let matchPrice = text.match(/單價\s*\(CPI\s*基準\):\s*([\d.]+)/) || text.match(/CPI[^\d]*([\d.]+)/) || text.match(/整體平均單價[^\d]*([\d.]+)/);
  let matchGini = text.match(/吉尼係數:\s*([\d.]+)/);

  if (matchAsset || matchPrice || matchGini) {
    if (matchAsset && matchAsset[1]) { document.getElementById("asset").value = matchAsset[1]; flashHighlight("asset"); }
    if (matchPrice && matchPrice[1]) { document.getElementById("price").value = matchPrice[1]; flashHighlight("price"); }
    if (matchGini && matchGini[1]) { document.getElementById("gini").value = matchGini[1]; flashHighlight("gini"); }
    return; 
  }

  // --- C. 原本的「全班原始數據(亂碼黏著)」格式解析 ---
  const lines = text.split("\n");
  let totalConsumption=0, totalItems=0, totalMoney=0;
  let balances = [];
  let validCount = 0;

  lines.forEach(line => {
    line = line.replace(/\s+/g, ' ').trim();
    if(!line || line.includes("座號") || line.includes("姓名")) return;

    let balance=0, items=0, consume=0, asset=0;
    let parsedSuccessfully = false;

    let gluedMatch = line.match(/^(\d+)([\u4e00-\u9fa5a-zA-Z]+)\s*(\d+)\s+(\d+)件\s*\/\s*([\d,]+)$/);
    if(gluedMatch) {
      let b_and_i_str = gluedMatch[4];
      let c_and_a_str = gluedMatch[5].replace(/,/g, '');
      let found = false;
      for (let b_len = 1; b_len < b_and_i_str.length; b_len++) {
        let B = parseInt(b_and_i_str.substring(0, b_len), 10);
        let I = parseInt(b_and_i_str.substring(b_len), 10);
        for (let c_len = 1; c_len < c_and_a_str.length; c_len++) {
          let C = parseInt(c_and_a_str.substring(0, c_len), 10);
          let A = parseInt(c_and_a_str.substring(c_len), 10);
          if (B + C === A) { balance = B; items = I; consume = C; asset = A; found = true; break; }
        }
        if (found) break;
      }
      if (found) parsedSuccessfully = true;
    }

    if (!parsedSuccessfully) {
      let p = line.split(/\s+/);
      if(p.length >= 7) {
        balance = toNum(p[6]);
        const matches = line.match(/(\d+)件\s*\/\s*([\d,]+)\s+([\d,]+)$/);
        if(matches){ items = parseInt(matches[1]); consume = toNum(matches[2]); asset = toNum(matches[3]); parsedSuccessfully = true; }
      }
    }

    if (parsedSuccessfully) {
        totalConsumption += consume;
        totalItems += items;
        totalMoney += balance;
        balances.push(balance);
        validCount++;
    }
  });

  if (validCount > 0) {
      let avgMoney = (totalMoney / validCount).toFixed(1);
      let avgPrice = totalItems > 0 ? (totalConsumption / totalItems).toFixed(2) : "0";
      let giniValue = calcGini(balances).toFixed(3);

      document.getElementById("asset").value = avgMoney;
      document.getElementById("price").value = avgPrice;
      document.getElementById("gini").value = giniValue;
      
      flashHighlight("asset");
      flashHighlight("price");
      flashHighlight("gini");
      
      document.getElementById("quickPaste").value = `✅ 已解析 ${validCount} 筆數據！\n平均餘額：${avgMoney}\n平均單價：${avgPrice}\n吉尼：${giniValue}`;
  }
}

function calculate(){
  let asset = Number(document.getElementById("asset").value);
  let price = Number(document.getElementById("price").value);
  let stock = Number(document.getElementById("stock").value);
  let students = Number(document.getElementById("students").value);
  let baseAsset = Number(document.getElementById("baseAsset").value);
  let baseSalary = Number(document.getElementById("baseSalary").value);
  let adjustRatio = Number(document.getElementById("adjustRatio").value);
  let basePrice = Number(document.getElementById("basePrice").value);
  
  let giniInput = document.getElementById("gini").value;
  let gini = giniInput !== "" ? Number(giniInput).toFixed(3) : null;
  document.getElementById("giniDisplay").innerText = gini !== null ? gini : "-";

  let inflation = asset/baseAsset;
  let salary = Math.round(baseSalary*inflation*adjustRatio);
  let money = asset*students;
  let cpi = ((price-basePrice)/basePrice)*100;
  
  let baseGDP = (baseSalary * adjustRatio) * students + baseAsset * students * 0.35;
  let nominalGdp = Math.round(salary * students + money * 0.35);
  let realGdp = Math.round(nominalGdp / (1 + (cpi / 100)));
  
  let nominalGdpGrowth = ((nominalGdp - baseGDP) / baseGDP * 100);
  let realGdpGrowth = ((realGdp - baseGDP) / baseGDP * 100);
  
  document.getElementById("inflation").innerText = inflation.toFixed(2);
  document.getElementById("salary").innerText = salary;
  document.getElementById("cpi").innerText = cpi.toFixed(1)+"%";
  document.getElementById("money").innerText = money.toFixed(2);
  document.getElementById("gdpNominal").innerText = nominalGdp;
  document.getElementById("gdpReal").innerText = realGdp;
  document.getElementById("gdpGrowthReal").innerText = realGdpGrowth.toFixed(1)+"%";

  lastData={
    inflation:inflation.toFixed(2),
    salary:salary,
    cpi:cpi.toFixed(1),
    money:money.toFixed(2),
    gdp:nominalGdp,
    gdpGrowth:nominalGdpGrowth.toFixed(1),
    stock:stock,
    gini:gini,
    realGrowthPreview: realGdpGrowth.toFixed(1)
  };
}

function addHistory(){
  if(!lastData){ alert("請先計算經濟數據"); return; }
  let date = document.getElementById("date").value;
  if(!date){ alert("請選擇日期"); return; }
  
  historyData.push({
    date:date,
    inflation:lastData.inflation,
    salary:lastData.salary,
    cpi:lastData.cpi,
    money:lastData.money,
    gdp:lastData.gdp,
    gdpGrowth:lastData.gdpGrowth,
    stockp:lastData.stock,
    gini:lastData.gini,
    realGrowthPreview: lastData.realGrowthPreview
  });
  render();
}

// 🌟 匯出功能升級：包含完整的 8 大系統參數
function render(){
  let table = document.getElementById("historyTable");
  table.innerHTML=`<tr><th>日期</th><th>通膨</th><th>薪資</th><th>CPI</th><th>貨幣</th><th>名目GDP</th><th>實質成長</th><th>股價</th><th>吉尼係數</th></tr>`;
  
  // 建立完整程式碼字串，確保參數齊全
  let code = `// --- 系統參數 ---\n`;
  const params = ['baseAsset', 'students', 'totalShares', 'baseSalary', 'adjustRatio', 'savingRate', 'fixedRate', 'basePrice'];
  params.forEach(p => {
    // 確保即使格子空白，也會輸出 0 以防程式壞掉
    let val = document.getElementById(p).value;
    code += `let ${p} = ${val ? val : 0};\n`;
  });

  code += `\n// --- 歷史數據 ---\nlet historyData = [\n`;

  historyData.forEach(h=>{
    let displayGini = h.gini !== null ? h.gini : "-";
    let codeGini = h.gini !== null ? `,gini:${h.gini}` : ""; 

    table.innerHTML+=`
    <tr>
      <td>${h.date}</td>
      <td>${h.inflation}</td>
      <td>${h.salary}</td>
      <td>${h.cpi}%</td>
      <td>${h.money}</td>
      <td>${h.gdp}</td>
      <td>${h.realGrowthPreview}%</td>
      <td>${h.stockp}</td>
      <td>${displayGini}</td>
    </tr>`;
    code+=`  {date:"${h.date}",inflation:${h.inflation},salary:${h.salary},cpi:${h.cpi},money:${h.money},gdp:${h.gdp},gdpGrowth:${h.gdpGrowth},stockp:${h.stockp}${codeGini}},\n`;
  });
  code+="];\n";
  
  // 保留薪資資料不遺失
  code += `\nlet salaryData = ${JSON.stringify(salaryData, null, 2)};\n`;
  
  document.getElementById("output").value = code;
}
</script>
</body>
</html>
