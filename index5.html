<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大樹銀行刮刮樂</title>
<style>
body {
  font-family: "Microsoft JhengHei";
  display: flex; flex-direction: column; align-items: center; 
  min-height: 100vh;
  background: linear-gradient(135deg, #fdfbfb, #ebedee);
  margin: 0;
  padding: 20px 0;
  touch-action: pan-y;
}
h1 { color: #e74c3c; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);}

#ticket-select { margin-bottom: 25px; text-align: center; }
#ticket-select button {
  margin: 5px; padding: 10px 18px; font-size: 16px;
  border-radius: 10px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
#ticket-select button:hover { transform: scale(1.05); }
#ticket-select button.active {
  background: linear-gradient(135deg, #f39c12, #e67e22);
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  transform: scale(1.1);
}

#main-layout {
  display: flex; flex-direction: row; justify-content: center; align-items: flex-start;
  gap: 20px; max-width: 1200px; width: 100%; padding: 0 15px; box-sizing: border-box;
}

#left-column { flex: 0 0 320px; display: flex; flex-direction: column; align-items: center; }
#middle-column { flex: 0 0 340px; display: flex; flex-direction: column; align-items: center; }
#right-column { flex: 0 0 380px; display: flex; flex-direction: column; align-items: center; }

#number-selector-container {
  background: rgba(255,255,255,0.9); border-radius: 15px; padding: 15px;
  width: 100%; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center;
}
#number-selector-title { font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
#number-grid {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  max-height: 480px; overflow-y: auto; padding-right: 5px;
}
#number-grid::-webkit-scrollbar { width: 6px; }
#number-grid::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 3px; }

.num-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid #ccc;
  background: #fff; cursor: pointer; font-weight: bold; color: #555;
  transition: all 0.2s; font-size: 14px;
}
.num-btn:hover:not(.used) { background: #f1c40f; color: #fff; border-color: #f1c40f; }
.num-btn.active { background: #e74c3c; color: white; border-color: #e74c3c; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.num-btn.used { background: #ecf0f1; color: #bdc3c7; border-color: #ecf0f1; cursor: not-allowed; transform: none; box-shadow: none; }

#current-ticket-display {
  font-size: 18px; font-weight: bold; color: #2980b9; margin-bottom: 10px;
  background: #fff; padding: 12px 15px; border-radius: 12px; border: 2px dashed #3498db;
  width: 100%; box-sizing: border-box; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.game-rule {
  font-size: 15px; font-weight: bold; color: #d35400; margin-bottom: 15px;
  background: #fff3cd; padding: 12px 15px; border-radius: 12px; border: 1px solid #ffeeba;
  width: 100%; box-sizing: border-box; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

#ticket-info {
  background: rgba(255,255,255,0.9); border-radius: 15px; padding: 15px;
  width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box;
}
.prize-label {
  padding: 6px 10px; border-radius: 10px; font-size: 13px; color: white;
  font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); 
  transition: transform 0.2s; display: flex; flex-direction: column; align-items: center; line-height: 1.3;
}
.prize-label:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
.prize-percent { font-size: 11px; opacity: 0.9; margin-top: 2px; font-weight: normal; }

.prize-1000 { background: #e74c3c; } .prize-900  { background: #d35400; }
.prize-800  { background: #f39c12; } .prize-700  { background: #f1c40f; color:#333; }
.prize-600  { background: #2ecc71; } .prize-500  { background: #3498db; }
.prize-400  { background: #9b59b6; } .prize-300  { background: #1abc9c; }
.prize-200  { background: #16a085; } .prize-100  { background: #7f8c8d; }
.prize-none { background: #95a5a6; }

#scratch-container {
  position: relative; width: 360px; height: 220px; border-radius: 15px; overflow: hidden;
  cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.25); background: #fff; touch-action: none; 
}
#scratch-grid-container {
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
  width: 100%; height: 175px; position: absolute; top: 0; left: 0; z-index: 1;
}
.grid-cell {
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; border: 1px dashed #f0f0f0; user-select: none; transition: all 0.5s ease;
}
.grid-cell.dim { opacity: 0.2; filter: grayscale(100%); }
.grid-cell.highlight {
  background: #fff9c4; animation: pulse 1s infinite; border-radius: 10px;
  box-shadow: inset 0 0 15px #f1c40f; transform: scale(1.1); z-index: 10;
}
@keyframes pulse {
  0% { transform: scale(1.1); }
  50% { transform: scale(1.25); box-shadow: inset 0 0 25px #f1c40f; }
  100% { transform: scale(1.1); }
}

#encouraging-text {
  position: absolute; bottom: 12px; left: 0; width: 100%;
  text-align: center; font-size: 15px; font-weight: bold; color: #e67e22; z-index: 2; letter-spacing: 1px;
}
#scratch-canvas { position: absolute; top: 0; left: 0; z-index: 5; }

/* 按鈕區調整 */
#action-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; width: 360px; justify-content: center; }
#action-buttons button {
  padding: 12px 0; font-size: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s;
}

button#reveal-btn { flex: 1 1 45%; border: 2px solid #e74c3c; background: #fff; color: #e74c3c; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
button#reveal-btn:hover { background: #e74c3c; color: white; transform: scale(1.05); }

button#reset-btn { flex: 1 1 45%; border: none; background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
button#reset-btn:hover { transform: scale(1.05); }

/* 十連抽按鈕樣式 */
button#ten-pull-btn {
  flex: 1 1 100%; border: none; background: linear-gradient(135deg, #f1c40f, #f39c12); color: white;
  font-size: 18px; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
button#ten-pull-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

#result-banner {
  display: none; width: 360px; margin-top: 15px; padding: 15px; border-radius: 12px;
  text-align: center; font-weight: bold; box-sizing: border-box;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
@keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.win-banner { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
.lose-banner { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }

/* --- 十連抽彈出視窗 (Modal) --- */
#ten-pull-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000;
  display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);
}
#ten-pull-content {
  background: white; border-radius: 20px; padding: 25px; width: 90%; max-width: 500px;
  text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#ten-pull-content h2 { color: #e74c3c; margin-top: 0; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
#ten-pull-grid {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;
}
.ten-pull-item {
  width: 18%; min-width: 70px; background: #f8f9fa; border: 2px solid #ecf0f1; border-radius: 12px;
  padding: 10px 5px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
}
.ten-pull-item.win { background: #fff9c4; border-color: #f1c40f; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.2); }
.ten-pull-item .num { font-size: 12px; color: #95a5a6; margin-bottom: 5px; font-weight: bold; }
.ten-pull-item .sym { font-size: 26px; margin-bottom: 5px; line-height: 1; }
.ten-pull-item .amt { font-size: 13px; font-weight: bold; color: #333; }
.ten-pull-item.win .amt { color: #d35400; }

#ten-pull-total {
  font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 20px;
  background: #ecf0f1; padding: 10px; border-radius: 10px;
}
#ten-pull-total span { color: #e74c3c; font-size: 26px; }
#close-ten-pull {
  padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer;
  background: #e74c3c; color: white; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); transition: transform 0.2s;
}
#close-ten-pull:hover { transform: scale(1.05); }

@media (max-width: 1080px) {
  #main-layout { flex-wrap: wrap; }
  #left-column, #middle-column, #right-column { flex: 1 1 340px; }
  #number-grid { max-height: 250px; }
}
@media (max-width: 768px) {
  #main-layout { flex-direction: column; align-items: center; gap: 15px; }
  #left-column, #middle-column, #right-column { width: 100%; max-width: 380px; flex: auto; }
  #number-grid { max-height: 140px; }
  .ten-pull-item { width: 30%; } /* 手機版彈出視窗裡的卡片變大一點 */
}
</style>
</head>
<body>

<h1>大樹銀行刮刮樂 🎉</h1>

<div id="ticket-select">
  <button data-ticket="100">100點</button>
  <button data-ticket="200">200點</button>
  <button data-ticket="300">300點</button>
  <button data-ticket="500">500點(保證中獎)</button>
  <button data-ticket="1000">1000點</button>
</div>

<div id="main-layout">
  <div id="left-column">
    <div id="number-selector-container">
      <div id="number-selector-title">👇 請挑選一張幸運號碼 👇</div>
      <div id="number-grid"></div>
    </div>
  </div>
  <div id="middle-column">
    <div id="current-ticket-display">尚未選擇號碼</div>
    <div class="game-rule">✨ 遊戲規則：集滿「3個相同圖案」即得該獎金！ ✨</div>
    <div id="ticket-info"></div>
  </div>
  <div id="right-column">
    <div id="scratch-container">
      <div id="scratch-grid-container"></div>
      <div id="encouraging-text"></div>
      <canvas id="scratch-canvas" width="360" height="220"></canvas>
    </div>
    <div id="action-buttons">
      <button id="reveal-btn">直接開獎</button>
      <button id="reset-btn">隨機盲抽</button>
      <button id="ten-pull-btn">🚀 豪華十連抽</button>
    </div>
    <div id="result-banner"></div>
  </div>
</div>

<div id="ten-pull-overlay">
  <div id="ten-pull-content">
    <h2>🎉 十連抽結果 🎉</h2>
    <div id="ten-pull-grid"></div>
    <div id="ten-pull-total"></div>
    <button id="close-ten-pull">確認收下</button>
  </div>
</div>

<script>
const canvas = document.getElementById('scratch-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true }); 
const gridContainer = document.getElementById('scratch-grid-container');
const encouragingText = document.getElementById('encouraging-text');
const resultBanner = document.getElementById('result-banner');
const resetBtn = document.getElementById('reset-btn');
const revealBtn = document.getElementById('reveal-btn');
const tenPullBtn = document.getElementById('ten-pull-btn');
const ticketInfo = document.getElementById('ticket-info');
const ticketButtons = document.querySelectorAll('#ticket-select button');
const numberGrid = document.getElementById('number-grid');
const currentTicketDisplay = document.getElementById('current-ticket-display');

const tenPullOverlay = document.getElementById('ten-pull-overlay');
const tenPullGrid = document.getElementById('ten-pull-grid');
const tenPullTotal = document.getElementById('ten-pull-total');
const closeTenPull = document.getElementById('close-ten-pull');

let isDrawing = false;
let scratchedPercent = 0;
let currentPrize;
let currentTicket = "100";
let currentLuckyNumber = "00";
let scratchTick = 0; 
let isRevealed = false; 

const usedTickets = { "100": [], "200": [], "300": [], "500": [], "1000": [] };

const ticketPrizes={
  "100":[
    {name:"2000點",chance:0.001},{name:"1000點",chance:0.005},{name:"500點",chance:0.02},
    {name:"300點",chance:0.05},{name:"200點",chance:0.10},{name:"100點",chance:0.15},{name:"沒中獎",chance:0.674}
  ],
  "200":[
    {name:"5000點",chance:0.001},{name:"2000點",chance:0.003},{name:"1000點",chance:0.01},
    {name:"500點",chance:0.03},{name:"300點",chance:0.06},{name:"200點",chance:0.10},{name:"沒中獎",chance:0.796}
  ],
  "300":[
    {name:"10000點",chance:0.0005},{name:"5000點",chance:0.002},{name:"2000點",chance:0.008},
    {name:"1000點",chance:0.02},{name:"500點",chance:0.05},{name:"300點",chance:0.10},{name:"沒中獎",chance:0.8195}
  ],
  "500":[
    {name:"100點",chance:0.25},{name:"200點",chance:0.20},{name:"300點",chance:0.15},{name:"400點",chance:0.12},
    {name:"500點",chance:0.10},{name:"600點",chance:0.06},{name:"700點",chance:0.05},{name:"800點",chance:0.04},
    {name:"900點",chance:0.02},{name:"1000點",chance:0.01}
  ],
  "1000":[
    {name:"50000點",chance:0.0005},{name:"10000點",chance:0.002},{name:"5000點",chance:0.01},
    {name:"2000點",chance:0.05},{name:"1000點",chance:0.10},{name:"沒中獎",chance:0.8375}
  ]
};

const symbolMap = {
  "50000點": "🚀", "10000點": "👑", "5000點": "💎", "2000點": "🐉", "1000點": "💰",
  "900點": "🧧", "800點": "🏆", "700點": "🎲", "600點": "🍒",
  "500點": "🍉", "400點": "🍋", "300點": "🔔", "200點": "🍀",
  "100點": "⭐"
};
const allSymbols = Object.values(symbolMap);

const quotes = [
  "幸運女神在向你微笑呢！ ✨", "下一張說不定就是大獎！ 🎁", "每天都要充滿希望喔！ 🌟",
  "好運正在加載中... ⏳", "不要氣餒，幸運就在轉角處！ 🍀", "大樹銀行祝您財源廣進！ 💰",
  "深呼吸，刮開你的專屬好運！ 💖", "今天又是個充滿驚喜的一天！ 🎈", "好運降臨，擋都擋不住！ 🚀",
  "試試手氣，讓好運伴隨你！ 🌈"
];

function generateGridSymbols(prize) {
  let grid = new Array(9).fill(null);
  let counts = {};
  allSymbols.forEach(s => counts[s] = 0);

  if (prize !== "沒中獎") {
    const winSymbol = symbolMap[prize];
    let placed = 0;
    while(placed < 3) {
      let idx = Math.floor(Math.random() * 9);
      if (grid[idx] === null) { grid[idx] = winSymbol; placed++; }
    }
    counts[winSymbol] = 3;
    for (let i = 0; i < 9; i++) {
      if (grid[i] === null) {
        let availableSymbols = allSymbols.filter(s => s !== winSymbol && counts[s] < 2);
        let s = availableSymbols[Math.floor(Math.random() * availableSymbols.length)];
        grid[i] = s; counts[s]++;
      }
    }
  } else {
    for (let i = 0; i < 9; i++) {
      let availableSymbols = allSymbols.filter(s => counts[s] < 2);
      let s = availableSymbols[Math.floor(Math.random() * availableSymbols.length)];
      grid[i] = s; counts[s]++;
    }
  }
  return grid;
}

function renderGrid(symbols) {
  gridContainer.innerHTML = '';
  symbols.forEach(symbol => {
    const div = document.createElement('div');
    div.classList.add('grid-cell');
    div.textContent = symbol;
    gridContainer.appendChild(div);
  });
}

function initNumberGrid() {
  numberGrid.innerHTML = "";
  for (let i = 0; i <= 99; i++) {
    const numStr = i.toString().padStart(2, '0');
    const btn = document.createElement('button');
    btn.classList.add('num-btn');
    btn.textContent = numStr;
    btn.dataset.num = numStr;
    btn.addEventListener('click', () => selectLuckyNumber(numStr));
    numberGrid.appendChild(btn);
  }
}

function refreshGridStatus() {
  document.querySelectorAll('.num-btn').forEach(btn => {
    let num = btn.dataset.num;
    if (usedTickets[currentTicket].includes(num)) {
      btn.classList.add('used'); btn.classList.remove('active');
    } else {
      btn.classList.remove('used'); btn.classList.remove('active');
    }
  });
}

function selectLuckyNumber(numStr) {
  if (usedTickets[currentTicket].includes(numStr)) {
    alert("哎呀！這張刮刮樂剛剛被買走囉，請挑選其他號碼！"); return;
  }
  currentLuckyNumber = numStr;
  document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`.num-btn[data-num="${numStr}"]`);
  if(activeBtn) activeBtn.classList.add('active');
  const ticketTypeName = document.querySelector('#ticket-select button.active').textContent;
  currentTicketDisplay.textContent = `🎟️ 正在刮：${ticketTypeName} - 尾號 ${currentLuckyNumber}`;
  startNewTicket();
}

function showTicketInfo(ticket){
  const container = ticketInfo;
  container.innerHTML = "";
  ticketPrizes[ticket].forEach(p=>{
    const span = document.createElement('span');
    span.classList.add('prize-label');
    const num = parseInt(p.name);
    if(num>=1000) span.classList.add("prize-1000");
    else if(num>=900) span.classList.add("prize-900");
    else if(num>=800) span.classList.add("prize-800");
    else if(num>=700) span.classList.add("prize-700");
    else if(num>=600) span.classList.add("prize-600");
    else if(num>=500) span.classList.add("prize-500");
    else if(num>=400) span.classList.add("prize-400");
    else if(num>=300) span.classList.add("prize-300");
    else if(num>=200) span.classList.add("prize-200");
    else if(num>=100) span.classList.add("prize-100");
    else span.classList.add("prize-none");
    
    // ⭐ 在這裡修改中央標籤區的「沒中獎」圖案
    const symbol = p.name === "沒中獎" ? "☁️" : symbolMap[p.name];
    const percentStr = Number((p.chance * 100).toFixed(3)) + '%';
    span.innerHTML = `<div>${symbol} ${p.name}</div><div class="prize-percent">(${percentStr})</div>`;
    container.appendChild(span);
  });
}

ticketButtons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTicket = btn.dataset.ticket;
    ticketButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    showTicketInfo(currentTicket);
    refreshGridStatus();
    if(usedTickets[currentTicket].includes(currentLuckyNumber)){
       drawRandomTicket();
    } else { selectLuckyNumber(currentLuckyNumber); }
  });
});

function getRandomPrize(){
  const prizes = ticketPrizes[currentTicket];
  const rand = Math.random();
  let cumulative = 0;
  for(let p of prizes){
    cumulative += p.chance;
    if(rand < cumulative) return p.name;
  }
  return prizes[prizes.length-1].name;
}

function initScratch(){
  ctx.globalCompositeOperation = 'source-over';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  grad.addColorStop(0,'#bdc3c7'); grad.addColorStop(0.5,'#95a5a6'); grad.addColorStop(1,'#7f8c8d');
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
  
  ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "20px Microsoft JhengHei";
  ctx.textAlign = "center"; ctx.fillText("✨ 直接刮這邊 ✨", canvas.width/2, canvas.height/2 + 7);

  ctx.globalCompositeOperation = 'destination-out';
  resultBanner.style.display = 'none'; revealBtn.style.display = 'inline-block'; 
  scratchedPercent = 0; scratchTick = 0; isRevealed = false;
}

function startNewTicket() {
  currentPrize = getRandomPrize();
  renderGrid(generateGridSymbols(currentPrize));
  encouragingText.textContent = quotes[Math.floor(Math.random() * quotes.length)];
  initScratch();
}

canvas.addEventListener('mousedown',()=>isDrawing=true);
canvas.addEventListener('mouseup',()=>isDrawing=false);
canvas.addEventListener('mouseleave',()=>isDrawing=false);
canvas.addEventListener('mousemove',scratchMove);
canvas.addEventListener('touchstart',(e)=>{ isDrawing=true; scratchMove(e); }, {passive: false});
canvas.addEventListener('touchend',()=>isDrawing=false);
canvas.addEventListener('touchmove',scratchMove, {passive: false});

function scratchMove(e){
  if (e.cancelable) e.preventDefault(); 
  if(!isDrawing || isRevealed) return; 
  
  const rect = canvas.getBoundingClientRect();
  let x, y;
  if(e.type.includes('touch')){
    x = e.touches[0].clientX - rect.left;
    y = e.touches[0].clientY - rect.top;
  } else {
    x = e.clientX - rect.left;
    y = e.clientY - rect.top; 
  }
  
  ctx.beginPath(); ctx.arc(x, y, 26, 0, Math.PI*2); ctx.fill();
  
  scratchTick++;
  if(scratchTick % 8 === 0){ calculateScratched(); }
}

function triggerReveal() {
  if (isRevealed) return;
  isRevealed = true;
  
  ctx.clearRect(0,0,canvas.width,canvas.height); 
  resultBanner.style.display = 'block'; revealBtn.style.display = 'none'; 
  
  if (currentPrize === "沒中獎") {
    resultBanner.className = 'lose-banner';
    resultBanner.innerHTML = `<div style="font-size:24px; margin-bottom:5px;">❌ 沒中獎</div><div style="font-size:16px; font-weight:normal;">很可惜，沒有湊齊3個相同圖案</div>`;
    document.querySelectorAll('.grid-cell').forEach(cell => cell.classList.add('dim'));
  } else {
    const winSymbol = symbolMap[currentPrize];
    resultBanner.className = 'win-banner';
    resultBanner.innerHTML = `<div style="font-size:20px; margin-bottom:5px;">🎉 恭喜中獎！湊齊三個 ${winSymbol}</div><div style="font-size:32px; color:#c0392b; text-shadow:1px 1px 2px rgba(0,0,0,0.1);">獲得 ${currentPrize}</div>`;
    document.querySelectorAll('.grid-cell').forEach(cell => {
      if (cell.textContent === winSymbol) cell.classList.add('highlight');
      else cell.classList.add('dim');
    });
  }

  if (!usedTickets[currentTicket].includes(currentLuckyNumber)) {
    usedTickets[currentTicket].push(currentLuckyNumber);
    const activeBtn = document.querySelector(`.num-btn[data-num="${currentLuckyNumber}"]`);
    if(activeBtn) { activeBtn.classList.remove('active'); activeBtn.classList.add('used'); }
  }
}

function calculateScratched(){
  if (isRevealed) return;
  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let transparent = 0;
  for(let i=3; i<img.data.length; i+=16){
    if(img.data[i] < 50) transparent++;
  }
  scratchedPercent = transparent / ((canvas.width * canvas.height) / 4) * 100;
  
  if(scratchedPercent > 80){ triggerReveal(); }
}

revealBtn.addEventListener('click', triggerReveal);

function drawRandomTicket() {
  let available = [];
  for(let i=0; i<=99; i++){
    let numStr = i.toString().padStart(2, '0');
    if(!usedTickets[currentTicket].includes(numStr)) available.push(numStr);
  }
  if(available.length === 0){ alert("太熱銷啦！這個面額的刮刮樂已經全部被刮完了！"); return; }
  const randomNum = available[Math.floor(Math.random() * available.length)];
  const activeBtn = document.querySelector(`.num-btn[data-num="${randomNum}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  selectLuckyNumber(randomNum);
}

resetBtn.addEventListener('click', drawRandomTicket);

tenPullBtn.addEventListener('click', () => {
  let available = [];
  for(let i=0; i<=99; i++){
    let numStr = i.toString().padStart(2, '0');
    if(!usedTickets[currentTicket].includes(numStr)) available.push(numStr);
  }
  
  if(available.length < 10){
    alert(`此面額剩餘的刮刮樂不足 10 張 (剩餘 ${available.length} 張)，請先重整網頁或切換面額！`);
    return;
  }

  let picked = [];
  for(let i=0; i<10; i++) {
    let randIdx = Math.floor(Math.random() * available.length);
    picked.push(available[randIdx]);
    available.splice(randIdx, 1); 
  }

  let resultsHTML = '';
  let totalWin = 0;

  picked.forEach(num => {
    usedTickets[currentTicket].push(num); 
    
    let prize = getRandomPrize(); 
    let winAmount = prize === "沒中獎" ? 0 : parseInt(prize.replace('點', ''));
    totalWin += winAmount;

    // ⭐ 在這裡修改「十連抽」介面裡的「沒中獎」圖案
    let symbol = prize === "沒中獎" ? "☁️" : symbolMap[prize];
    let statusClass = prize === "沒中獎" ? "lose" : "win";

    resultsHTML += `
      <div class="ten-pull-item ${statusClass}">
        <div class="num">尾號 ${num}</div>
        <div class="sym">${symbol}</div>
        <div class="amt">${prize}</div>
      </div>
    `;
  });

  refreshGridStatus();
  tenPullGrid.innerHTML = resultsHTML;
  tenPullTotal.innerHTML = `總計獲得：<span>${totalWin} 點</span>`;
  tenPullOverlay.style.display = 'flex'; 

  if(usedTickets[currentTicket].includes(currentLuckyNumber)) {
     drawRandomTicket();
  }
});

closeTenPull.addEventListener('click', () => {
  tenPullOverlay.style.display = 'none';
});

initNumberGrid();
ticketButtons[0].classList.add('active');
showTicketInfo(currentTicket);
drawRandomTicket(); 
</script>
</body>
</html>
